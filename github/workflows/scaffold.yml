name: Montar Estrutura Android

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Gerar estrutura Android/iOS
        run: |
          flutter create --org com.devocionalplus --project-name devocional_plus /tmp/scaffold
          cp -r /tmp/scaffold/android .
          cp -r /tmp/scaffold/ios .

      - name: Salvar no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android ios
          git commit -m "chore: estrutura Android/iOS gerada automaticamente" || echo "Nada novo"
          git push
